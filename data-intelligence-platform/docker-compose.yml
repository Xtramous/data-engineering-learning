version: '3.9'

services:
  # PostgreSQL - Data Warehouse
  postgres:
    image: postgres:15-alpine
    container_name: dip-postgres
    environment:
      POSTGRES_DB: datawarehouse
      POSTGRES_USER: ${POSTGRES_USER:-dataeng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataeng"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dip_network

  # Neo4j - Lineage Graph Database
  neo4j:
    image: neo4j:5.18-community
    container_name: dip-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-secure123}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_apoc_export_allow__all__imports: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
      - ./data/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dip_network

  # OpenSearch - Full-text Search + Embeddings
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: dip-opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx2g"
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dip_network

  # Ollama - Local LLM (Llama 3)
  ollama:
    image: ollama/ollama:latest
    container_name: dip-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dip_network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dip-backend
    environment:
      DATABASE_URL: postgresql://dataeng:secure123@postgres:5432/datawarehouse
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: secure123
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OLLAMA_BASE_URL: http://ollama:11434
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - dip_network
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dip-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - dip_network
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8000
      BROWSER: none
    command: npm start

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  ollama_data:

networks:
  dip_network:
    driver: bridge
